name: BestYearPlanner
options:
  bundleIdPrefix: com.bestyear
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_CFBundleDisplayName: "Best Year Planner"

targets:
  BestYearPlanner:
    type: application
    platform: iOS
    sources:
      - path: Best Year Planner
        excludes:
          - "**/*.xcassets"
      - path: Best Year Planner/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bestyear.planner
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoadsInMedia: YES
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies: []

  BestYearPlannerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Best Year PlannerTests
    dependencies:
      - target: BestYearPlanner

  BestYearPlannerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Best Year PlannerUITests
    dependencies:
      - target: BestYearPlanner

schemes:
  BestYearPlanner:
    build:
      targets:
        BestYearPlanner: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BestYearPlannerTests
        - BestYearPlannerUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
